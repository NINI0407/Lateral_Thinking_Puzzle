<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>海龜湯題庫與投稿</title>
        <link rel="stylesheet" href="/font/style.css">
        <link rel="icon" href="/font/icon.png" type="image/png">
        <style>
            body {
                background-image: url('font/photo.jpg');
                padding: 30px;
                display: flex;
                flex-direction: row;
                gap: 40px;
            }

            .list-section {
                flex: 1;
                background: rgba(20, 20, 20, 0.8);
                padding: 20px;
                border-radius: 10px;
                border: 1px solid #444;
                height: 90vh;
                overflow-y: auto;
            }

            .form-section {
                flex: 1;
                background: rgba(20, 20, 20, 0.8);
                padding: 20px;
                height: 90vh;
                border-radius: 10px;
                border: 1px solid #cc1111;
            }

            input,
            textarea {
                font-family: "NaikaiFont", sans-serif;
                margin: 5px 0;
                padding: 12px;
                font-size: 16px;
                background: rgba(0, 0, 0, 0.8);
                border: 1px solid #552222;
                color: #fff;
                border-radius: 6px;
                transition: all 0.3s ease;
                width: 100%;
            }

            input:focus,
            textarea:focus {
                outline: none;
                border-color: #cc1111;
                box-shadow: 0 0 8px rgba(204, 17, 17, 0.5);
            }

            .story-item {
                background: rgba(24, 16, 16, 0.8);
                padding: 10px;
                margin-bottom: 10px;
                border-left: 4px solid #cc1111;
                font-size: 14px;
                line-height: 1.4;
            }

            .auth-check {
                margin-top: 20px;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 20px;
                border: 1px dotted #cc1111;
            }

            .login-prompt {
                color: #cc1111;
                margin: 10px 0;
            }

            .logged-in-info {
                color: rgb(156, 202, 119);
                margin: 10px 0;
            }
        </style>
    </head>

    <body>

        <div class="list-section">
            <h2 style="color:#cc1111;">題目列表</h2>
            <div id="storyList">載入中...</div>
        </div>

        <div class="form-section">
            <h2 style="color:#cc1111;">新增題目</h2>
            <input type="text" id="title" placeholder="輸入題目名稱"><br>
            <textarea id="story" rows="5" placeholder="輸入題目（開頭故事）"></textarea><br>
            <textarea id="answer" rows="5" placeholder="輸入解答（不公開）"></textarea><br>
            <button onclick="sendSubmission()" id="submitBtn">確認送出</button>
            <button onclick="location.href='/'">回首頁</button>

            <div class="auth-check">
                <div id="notLoggedIn" style="display:none;">
                    <p class="login-prompt">⚠️ 你需要登入才能投稿</p>
                    <button onclick="location.href='/login_page'" style="width: 100%;">前往登入</button>
                </div>
                <div id="loggedIn" style="display:none;">
                    <p class="logged-in-info">✓ 已登入為：<strong id="displayUsername"></strong></p>
                    <button onclick="logout()" style="width: 100%; background:#cc1111;">登出</button>
                </div>
            </div>
        </div>

        <script>
            function checkLoginStatus() {
                const username = localStorage.getItem('username');
                const userId = localStorage.getItem('user_id');

                const notLoggedIn = document.getElementById('notLoggedIn');
                const loggedIn = document.getElementById('loggedIn');
                const submitBtn = document.getElementById('submitBtn');

                if (username && userId) {
                    // 已登入
                    notLoggedIn.style.display = 'none';
                    loggedIn.style.display = 'block';
                    document.getElementById('displayUsername').textContent = username;
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                } else {
                    // 未登入
                    notLoggedIn.style.display = 'block';
                    loggedIn.style.display = 'none';
                    submitBtn.disabled = true;
                    submitBtn.style.opacity = '0.5';
                }
            }

            function logout() {
                if (confirm('確定要登出嗎？')) {
                    localStorage.removeItem('user_id');
                    localStorage.removeItem('username');
                    alert('已登出');
                    location.reload();
                }
            }

            function loadStories() {
                fetch('/api/get_all_titles')
                    .then(res => res.json())
                    .then(data => {
                        const container = document.getElementById('storyList');
                        if (data.length === 0) {
                            container.innerHTML = "<p>目前題庫空空如也，歡迎當第一位投稿者！</p>";
                            return;
                        }
                        container.innerHTML = data.map(item => `
                    <div class="story-item">
                        <strong>${item.title}</strong><br>
                        <span style="color:#bbb;">${item.story}</span>
                    </div>
                `).join('');
                    });
            }

            function sendSubmission() {
                const username = localStorage.getItem('username');
                const userId = localStorage.getItem('user_id');

                if (!username || !userId) {
                    alert("請先登入！");
                    location.href = '/login_page';
                    return;
                }

                const title = document.getElementById('title').value.trim();
                const story = document.getElementById('story').value.trim();
                const answer = document.getElementById('answer').value.trim();

                if (!title || !story || !answer) {
                    alert("所有欄位都要填寫完畢！");
                    return;
                }

                fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, story, answer, user_id: userId })
                })
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        // 重新整理左邊列表，並清空輸入框
                        loadStories();
                        document.getElementById('title').value = '';
                        document.getElementById('story').value = '';
                        document.getElementById('answer').value = '';
                    });
            }

            // 初始化
            window.addEventListener('load', function () {
                checkLoginStatus();
                loadStories();
            });
        </script>
    </body>

</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>海龜湯 - 登入</title>
    <style>
        @font-face {
            font-family: 'NaikaiFont';
            src: url('/font/NaikaiFont-Bold.ttf') format('truetype');
        }

        body {
            text-align: center;
            font-family: 'NaikaiFont', Geneva, Tahoma, sans-serif;
            background-image: url('/font/bg.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid crimson;
            width: 350px;
            box-shadow: 0 8px 32px rgba(220, 20, 60, 0.3);
        }

        h1 {
            color: crimson;
            font-size: 50px;
            margin: 0 0 30px 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            color: white;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: 2px solid #444;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: crimson;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'NaikaiFont', Geneva, Tahoma, sans-serif;
            font-weight: bold;
        }

        .btn-login {
            background: crimson;
            color: white;
        }

        .btn-login:hover {
            background: darkred;
        }

        .btn-cancel {
            background: #444;
            color: white;
        }

        .btn-cancel:hover {
            background: #555;
        }

        .signup-link {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }

        .signup-link a {
            color: #ffcc00;
            text-decoration: none;
            cursor: pointer;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }

        .message-success {
            background: rgba(0, 200, 0, 0.3);
            color: #0f0;
            border: 1px solid #0f0;
        }

        .message-error {
            background: rgba(200, 0, 0, 0.3);
            color: #f00;
            border: 1px solid #f00;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🐢 海龜湯</h1>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">帳號</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="輸入帳號"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">密碼</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="輸入密碼"
                    required
                >
            </div>

            <div id="message"></div>

            <div class="button-group">
                <button type="submit" class="btn-login">登入</button>
                <button type="button" class="btn-cancel" onclick="goBack()">返回</button>
            </div>
        </form>

        <div class="signup-link">
            還沒有帳號？ <a onclick="goRegister()">點此註冊</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            if (!username || !password) {
                showMessage('帳號和密碼不能為空！', 'error');
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // 存儲用户信息到本地儲存
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    showMessage('登入成功！正在跳轉...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showMessage(data.message || '登入失敗', 'error');
                }
            })
            .catch(err => {
                showMessage('網絡錯誤：' + err.message, 'error');
            });
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message-' + type;
            messageDiv.style.display = 'block';
        }

        function goRegister() {
            window.location.href = '/register_page';
        }

        function goBack() {
            window.location.href = '/';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>海龜湯 - 登入</title>
        <link rel="stylesheet" href="/font/style.css">
        <link rel="icon" href="/font/icon.png" type="image/png">
        <style>
            body {
                justify-content: center;
                background-image: url('/font/bg.jpg');
                background-size: cover;
                padding: 20px;
            }

            .main-container {
                width: 100%;
                max-width: 420px;
                padding: 35px;
                text-align: center;
            }

            .main-container h1 {
                font-size: 56px;
                margin: 0 0 25px 0;
                text-shadow: 0 0 12px rgba(204, 17, 17, 0.45);
            }

            .input-group {
                margin-bottom: 18px;
                text-align: left;
            }

            .input-group label {
                display: block;
                margin-bottom: 8px;
                color: #e0e0e0;
                font-size: 14px;
            }

            .main-container input[type="text"],
            .main-container input[type="password"] {
                width: 100%;
                padding: 12px;
                border: 1px solid #552222;
                border-radius: 6px;
                background: rgba(0, 0, 0, 0.8);
                color: #ffffff;
                font-size: 16px;
                font-family: "NaikaiFont", Geneva, Tahoma, sans-serif;
                transition: all 0.25s ease;
            }

            .main-container input[type="text"]:focus,
            .main-container input[type="password"]:focus {
                outline: none;
                border-color: #cc1111;
                box-shadow: 0 0 10px rgba(204, 17, 17, 0.35);
            }

            .button-group {
                display: flex;
                gap: 10px;
                margin-top: 24px;
            }

            button {
                flex: 1;
            }

            .signup-link {
                margin-top: 18px;
                color: #ccc;
                font-size: 14px;
            }

            .signup-link a {
                color: #ffcc00;
                text-decoration: none;
            }

            .signup-link a:hover {
                text-decoration: underline;
            }

            #message {
                margin-top: 15px;
                padding: 10px;
                border-radius: 6px;
                display: none;
                font-weight: bold;
            }

            .message-success {
                background: rgba(0, 200, 0, 0.2);
                color: #9f9;
                border: 1px solid #5fbf5f;
            }

            .message-error {
                background: rgba(200, 0, 0, 0.2);
                color: #ff9999;
                border: 1px solid #ff3333;
            }
        </style>
    </head>

    <body>
        <div class="main-container">
            <h1>海龜湯</h1>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">帳號</label>
                    <input type="text" id="username" name="username" placeholder="輸入帳號" required>
                </div>

                <div class="input-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" placeholder="輸入密碼" required>
                </div>

                <div id="message"></div>

                <div class="button-group">
                    <button type="submit" class="button">登入</button>
                    <button type="button" class="button" onclick="goBack()">返回</button>
                </div>
            </form>

            <div class="signup-link">
                還沒有帳號？ <a onclick="goRegister()">點此註冊</a>
            </div>
        </div>

        <script>
            function handleLogin(event) {
                event.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const messageDiv = document.getElementById('message');

                if (!username || !password) {
                    showMessage('帳號和密碼不能為空！', 'error');
                    return;
                }

                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // 存儲用户信息到本地儲存
                            localStorage.setItem('user_id', data.user_id);
                            localStorage.setItem('username', data.username);
                            showMessage('登入成功！正在跳轉...', 'success');
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1500);
                        } else {
                            showMessage(data.message || '登入失敗', 'error');
                        }
                    })
                    .catch(err => {
                        showMessage('網絡錯誤：' + err.message, 'error');
                    });
            }

            function showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = text;
                messageDiv.className = 'message-' + type;
                messageDiv.style.display = 'block';
            }

            function goRegister() {
                window.location.href = '/register_page';
            }

            function goBack() {
                window.location.href = '/';
            }
        </script>
    </body>

</html>
